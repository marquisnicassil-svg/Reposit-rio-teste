<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INFODROID AI</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #007aff;
            --primary-hover: #005bb5;
            --text-color: #ffffff;
            --text-secondary: #a0a0a0;
            --bot-msg-bg: #2c2c2c;
            --user-msg-bg: #007aff;
            --border-radius: 18px;
        }

        :root.light-theme {
            --bg-color: #ffffff;
            --surface-color: #f5f5f5;
            --primary-color: #0066cc;
            --primary-hover: #0052a3;
            --text-color: #1a1a1a;
            --text-secondary: #666666;
            --bot-msg-bg: #e8e8e8;
            --user-msg-bg: #0066cc;
            --border-radius: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100dvh; /* Usa viewport dinâmico para mobile */
            width: 100vw;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Impede rolagem da página inteira */
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Cabecalho */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-color: var(--surface-color);
            border-bottom: 1px solid #333;
            z-index: 10;
            transition: background-color 0.3s ease;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Area de Chat */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Oculta scrollbar para um visual mais limpo */
        #chat-container::-webkit-scrollbar {
            display: none;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: var(--border-radius);
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            border-bottom-right-radius: 4px;
            color: #ffffff;
        }

        .message.bot {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            background-color: transparent;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-align: center;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 16px;
            align-items: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        /* Area de Input */
        #input-area {
            display: flex;
            padding: 12px 16px;
            background-color: var(--surface-color);
            border-top: 1px solid #333;
            align-items: flex-end;
            gap: 10px;
            transition: background-color 0.3s ease;
        }

        #message-input {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid #444;
            color: var(--text-color);
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 1rem;
            outline: none;
            resize: none;
            max-height: 120px;
            overflow-y: auto;
            font-family: inherit;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        #message-input:focus {
            border-color: var(--primary-color);
        }

        #send-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background-color 0.2s;
        }

        #send-btn:active {
            background-color: var(--primary-hover);
        }

        /* Modal de Configurações */
        #settings-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #settings-modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background-color: var(--surface-color);
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease, background-color 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        #settings-modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-content h2 {
            margin-bottom: 16px;
            font-size: 1.2rem;
        }

        .modal-content label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid #444;
            color: var(--text-color);
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .modal-content select {
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' fill='white'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }

        :root.light-theme .modal-content select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' fill='%231a1a1a'><path d='M7 10l5 5 5-5z'/></svg>");
        }

        .modal-content input:focus, .modal-content select:focus {
            border-color: var(--primary-color);
        }

        .theme-options {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .theme-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #444;
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .theme-btn:hover {
            border-color: var(--primary-color);
        }

        .theme-btn.active {
            border-color: var(--primary-color);
            background-color: var(--primary-color);
            color: white;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-cancel {
            background-color: transparent;
            color: var(--text-color);
        }

        .btn-save {
            background-color: var(--primary-color);
            color: white;
        }

        /* Animações */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <h1>INFODROID AI</h1>
        <button class="icon-btn" id="open-settings" aria-label="Configurações">
            <svg viewBox="0 0 24 24">
                <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.[...]
            </svg>
        </button>
    </header>

    <div id="chat-container">
        <div class="message system">Pronto para conversar. Envie uma mensagem!</div>
    </div>

    <div id="input-area">
        <textarea id="message-input" placeholder="Digite sua mensagem..." rows="1"></textarea>
        <button id="send-btn" aria-label="Enviar">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <h2>Configurações</h2>
            
            <label>Tema</label>
            <div class="theme-options">
                <button class="theme-btn" id="theme-dark" data-theme="dark">🌙 Escuro</button>
                <button class="theme-btn" id="theme-light" data-theme="light">☀️ Claro</button>
            </div>
            
            <label for="api-key-input">Gemini API Key</label>
            <input type="password" id="api-key-input" placeholder="Cole sua chave aqui...">
            
            <label for="model-select">Modelo do Gemini</label>
            <select id="model-select">
                <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash-Lite (Recomendado/Rápido)</option>
                <option value="gemini-3-flash">Gemini 3 Flash</option>
                <option value="gemini-3.1-pro">Gemini 3.1 Pro (Alta Raciocínio)</option>
                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
            </select>

            <label for="version-select">Versão do Endpoint da API</label>
            <select id="version-select">
                <option value="v1">v1 (Estável)</option>
                <option value="v1beta">v1beta (Experimental)</option>
            </select>
            
            <div class="modal-actions">
                <button class="btn btn-cancel" id="close-settings">Cancelar</button>
                <button class="btn btn-save" id="save-settings">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const settingsModal = document.getElementById('settings-modal');
        const openSettingsBtn = document.getElementById('open-settings');
        const closeSettingsBtn = document.getElementById('close-settings');
        const saveSettingsBtn = document.getElementById('save-settings');
        const apiKeyInput = document.getElementById('api-key-input');
        const modelSelect = document.getElementById('model-select');
        const versionSelect = document.getElementById('version-select');
        const themeDarkBtn = document.getElementById('theme-dark');
        const themeLightBtn = document.getElementById('theme-light');

        // Estado da Aplicação carregado do LocalStorage
        let apiKey = localStorage.getItem('gemini_api_key') || '';
        let modelName = localStorage.getItem('gemini_model') || 'gemini-3.1-flash-lite';
        let apiVersion = localStorage.getItem('gemini_api_version') || 'v1';
        let currentTheme = localStorage.getItem('app_theme') || 'dark';
        let chatHistory = [];

        // Aplicar tema ao carregar a página
        applyTheme(currentTheme);

        // Exibe aviso inicial se não houver chave salva
        if (!apiKey) {
            setTimeout(() => {
                addSystemMessage('Nenhuma API Key encontrada. Abra as configurações para configurar seu App.');
            }, 500);
        } else {
            setTimeout(() => {
                addSystemMessage(`Modelo ativo: ${modelName} (${apiVersion})`);
            }, 300);
        }

        // Ajuste dinâmico da altura da caixa de texto
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = 'auto';
        });

        // Controles do tema
        function applyTheme(theme) {
            const html = document.documentElement;
            if (theme === 'light') {
                html.classList.add('light-theme');
                currentTheme = 'light';
            } else {
                html.classList.remove('light-theme');
                currentTheme = 'dark';
            }
        }

        themeDarkBtn.addEventListener('click', () => {
            applyTheme('dark');
            updateThemeButtons();
        });

        themeLightBtn.addEventListener('click', () => {
            applyTheme('light');
            updateThemeButtons();
        });

        function updateThemeButtons() {
            themeDarkBtn.classList.toggle('active', currentTheme === 'dark');
            themeLightBtn.classList.toggle('active', currentTheme === 'light');
        }

        // Controles do painel de Configurações
        openSettingsBtn.addEventListener('click', () => {
            apiKeyInput.value = apiKey;
            modelSelect.value = modelName;
            versionSelect.value = apiVersion;
            updateThemeButtons();
            settingsModal.classList.add('active');
        });

        const closeModal = () => settingsModal.classList.remove('active');
        closeSettingsBtn.addEventListener('click', closeModal);

        saveSettingsBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                apiKey = key;
                modelName = modelSelect.value;
                apiVersion = versionSelect.value;

                localStorage.setItem('gemini_api_key', apiKey);
                localStorage.setItem('gemini_model', modelName);
                localStorage.setItem('gemini_api_version', apiVersion);
                localStorage.setItem('app_theme', currentTheme);

                closeModal();
                addSystemMessage(`Configurações aplicadas! Modelo alterado para: ${modelName}`);
            } else {
                alert('A chave da API não pode estar vazia.');
            }
        });

        // Eventos de Gatilho de Envio
        sendBtn.addEventListener('click', handleSend);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        async function handleSend() {
            const text = messageInput.value.trim();
            if (!text) return;

            if (!apiKey) {
                addSystemMessage('Por favor, adicione sua API Key nas configurações primeiro.');
                settingsModal.classList.add('active');
                return;
            }

            messageInput.value = '';
            messageInput.style.height = 'auto';

            addMessage(text, 'user');
            chatHistory.push({
                "role": "user",
                "parts": [{ "text": text }]
            });

            const typingId = showTypingIndicator();

            try {
                // Monta a URL dinamicamente com base nas escolhas feitas nas configurações
                const url = `https://generativelanguage.googleapis.com/${apiVersion}/models/${modelName}:generateContent?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: chatHistory
                    })
                });

                removeTypingIndicator(typingId);

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || 'Erro de comunicação com o servidor');
                }

                const botReply = data.candidates[0].content.parts[0].text;
                
                addMessage(botReply, 'bot');
                chatHistory.push({
                    "role": "model",
                    "parts": [{ "text": botReply }]
                });

            } catch (error) {
                removeTypingIndicator(typingId);
                addSystemMessage(`Erro: ${error.message}`);
                chatHistory.pop(); // Remove a última entrada para não corromper o histórico contextual
            }
        }

        // Funções Gráficas da UI Nativa
        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            
            // Segurança anti-injeção e tratamento de quebras de linha
            const formattedText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, '<br>');
            msgDiv.innerHTML = formattedText;
            
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function addSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', 'system');
            msgDiv.textContent = text;
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const id = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.classList.add('message', 'bot', 'typing-indicator');
            typingDiv.id = id;
            typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatContainer.appendChild(typingDiv);
            scrollToBottom();
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
